<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vial Labeler - Professional Product Branding</title>
    <script src="https://unpkg.com/konva@9.3.1/konva.min.js"></script>
    <style>
        :root {
            --primary: #007aff;
            --background: #0a0a0c;
            --surface: #1c1c1e;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #32d74b;
            --border: #38383a;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 350px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            background: var(--border);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .file-input {
            position: relative;
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-input:hover {
            border-color: var(--primary);
            background: rgba(0, 122, 255, 0.05);
        }

        .file-input input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1c1c1e 0%, #0a0a0c 100%);
            position: relative;
        }

        #canvas-container {
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .button:hover {
            opacity: 0.9;
        }

        .button.secondary {
            background-color: var(--border);
            color: var(--text);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        /* Crop Overlay Styles */
        #crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #crop-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            max-height: 80%;
        }

        .crop-controls {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }
    </style>
</head>

<body>
    <aside>
        <h1>Vial Labeler</h1>

        <div class="control-group">
            <div class="section-title">Assets</div>
            <div class="control-item">
                <label>Vial Image (Blank)</label>
                <div class="file-input">
                    <span id="vial-status">Click to upload vial</span>
                    <input type="file" id="vial-upload" accept="image/*">
                </div>
            </div>
            <div class="control-item">
                <label>Label Image</label>
                <div class="file-input">
                    <span id="label-status">Click to upload label</span>
                    <input type="file" id="label-upload" accept="image/*">
                </div>
                <!-- Crop Button -->
                <button type="button" class="button secondary" id="crop-btn" style="margin-top: 8px;">Crop
                    Label</button>
            </div>
        </div>

        <div class="control-group">
            <div class="section-title">Label Alignment</div>
            <div class="control-item">
                <label>Position X</label>
                <input type="range" id="posX" min="0" max="1000" value="500">
            </div>
            <div class="control-item">
                <label>Position Y</label>
                <input type="range" id="posY" min="0" max="1000" value="500">
            </div>
            <div class="control-item">
                <label>Scale</label>
                <input type="range" id="scale" min="1" max="200" value="100">
            </div>
            <div class="control-item">
                <label>Rotation</label>
                <input type="range" id="rotation" min="0" max="360" value="0">
            </div>
            <div class="control-item">
                <label>Wrap Intensity</label>
                <input type="range" id="wrap-intensity" min="0" max="100" value="0">
            </div>
            <div class="control-item">
                <label>Smile (Vertical Curve)</label>
                <input type="range" id="smile-intensity" min="-400" max="400" value="0">
            </div>
        </div>

        <div class="control-group">
            <div class="section-title">Lighting</div>
            <div class="control-item">
                <label>Shadow Intensity</label>
                <input type="range" id="shadow-opacity" min="0" max="100" value="50">
            </div>
            <div class="control-item">
                <label>Highlight Intensity</label>
                <input type="range" id="highlight-opacity" min="0" max="100" value="30">
            </div>
        </div>

        <div class="actions">
            <button type="button" class="button secondary" id="export-btn">Save JPEG</button>
            <button type="button" class="button secondary" id="config-btn">Copy Config</button>
            <button type="button" class="button secondary" id="import-btn">Import Config</button>
            <button type="button" class="button" id="autofit-btn"
                style="grid-column: span 1; background: var(--accent);">✨ Magic Fit</button>
        </div>
    </aside>

    <main>
        <div id="canvas-container"></div>

        <!-- Crop UI Overlay -->
        <div id="crop-overlay">
            <div id="crop-container"></div>
            <div class="crop-controls">
                <button class="button" id="apply-crop-btn">Apply Crop</button>
                <button class="button secondary" id="cancel-crop-btn">Cancel</button>
            </div>
        </div>
    </main>

PxkH/9k=";
        const width = 800;
        const height = 800;

        const stage = new Konva.Stage({
            container: 'canvas-container',
            width: width,
            height: height,
        });

        // Responsive Scaling Logic
        const fitStageIntoParentContainer = () => {
            const container = document.querySelector('main');
            if (!container) return;

            // Get available space (minus padding/margins if any)
            const containerWidth = container.offsetWidth - 40; // 20px padding each side
            const containerHeight = container.offsetHeight - 40;

            // Calculate scale to fit
            const scale = Math.min(
                containerWidth / width,
                containerHeight / height
            );

            // Apply scale (but don't scale up past original size to keep crispness)
            stage.width(width * Math.min(1, scale));
            stage.height(height * Math.min(1, scale));
            stage.scale({ x: Math.min(1, scale), y: Math.min(1, scale) });
        };

        // Initial fit and listen for resize
        fitStageIntoParentContainer();
        window.addEventListener('resize', fitStageIntoParentContainer);

        const mainLayer = new Konva.Layer();
        const effectLayer = new Konva.Layer();
        stage.add(mainLayer);
        stage.add(effectLayer);

        let vialImage, labelImage;
        const vialImgNode = new Konva.Image({ x: 0, y: 0 });

        // Group to hold label and its lighting effects
        const labelGroup = new Konva.Group({
            x: 400,
            y: 400,
            draggable: true
        });

        const labelImgNode = new Konva.Image({ x: 0, y: 0 });
        labelGroup.add(labelImgNode);

        // Centering helper
        labelGroup.on('dragmove', () => {
            document.getElementById('posX').value = Math.round((labelGroup.x() / width) * 1000);
            document.getElementById('posY').value = Math.round((labelGroup.y() / height) * 1000);
        });

        mainLayer.add(vialImgNode);
        mainLayer.add(labelGroup);

        // Upload Handlers
        const handleVialImage = (img, name) => {
            img.crossOrigin = "Anonymous"; // Try to prevent tainting if loaded from URL
            vialImgNode.image(img);
            const scale = Math.min(width / img.width, height / img.height);
            vialImgNode.width(img.width * scale);
            vialImgNode.height(img.height * scale);
            vialImgNode.x((width - vialImgNode.width()) / 2);
            vialImgNode.y((height - vialImgNode.height()) / 2);
            mainLayer.draw();
            document.getElementById('vial-status').innerText = name;

            // Auto-analyze lighting when a new vial is loaded
            setTimeout(analyzeLighting, 100);
        };

        document.getElementById('vial-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => handleVialImage(img, file.name);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Load Default Vial on Start
        window.onload = () => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => handleVialImage(img, 'default-vial.png');
            img.src = DEFAULT_VIAL_BASE64;
        };

        document.getElementById('label-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    originalLabelImageObj = img; // Store raw for cropping
                    labelImgNode.image(img);
                    labelImgNode.width(img.width * 0.5);
                    labelImgNode.height(img.height * 0.5);
                    // Center the label in the group's local coordinates
                    labelImgNode.x(0);
                    labelImgNode.y(0);
                    // Set group offset to center the content
                    labelGroup.offsetX(labelImgNode.width() / 2);
                    labelGroup.offsetY(labelImgNode.height() / 2);
                    updateTransform();
                    document.getElementById('label-status').innerText = file.name;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Controls
        const updateTransform = () => {
            // Guard: don't run if core nodes aren't ready
            if (!labelGroup || !labelImgNode) {
                console.warn('updateTransform: Nodes not ready.');
                return;
            }

            const px = document.getElementById('posX').value / 1000 * width;
            const py = document.getElementById('posY').value / 1000 * height;
            const sc = document.getElementById('scale').value / 100;
            const rt = document.getElementById('rotation').value;

            // Move the whole group
            labelGroup.x(px);
            labelGroup.y(py);
            labelGroup.scaleX(sc);
            labelGroup.scaleY(sc);
            labelGroup.rotation(rt);

            updateLighting();
            applyWarp();
            mainLayer.batchDraw();
        };

        const applyWarp = () => {
            if (!labelImgNode.image()) return;

            const wrapIntensity = document.getElementById('wrap-intensity').value / 100;
            const smileIntensity = document.getElementById('smile-intensity').value / 100;

            const padding = 150;

            const cylinderWarp = function (imageData) {
                if (wrapIntensity === 0 && smileIntensity === 0) return;

                const data = imageData.data;
                const width = imageData.width;
                const height = imageData.height;
                const outData = new Uint8ClampedArray(data.length);

                const centerX = width / 2;
                const labelWidth = width - padding * 2;

                const theta = wrapIntensity * (Math.PI / 2);
                const visibleWidthFactor = theta > 0 ? Math.sin(theta) / theta : 1;
                const visibleHalfWidth = (labelWidth / 2) * visibleWidthFactor;

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const idx = (y * width + x) * 4;
                        const nx = (x - centerX) / visibleHalfWidth;
                        if (Math.abs(nx) > 1) continue;

                        let sourceX = x;
                        if (wrapIntensity > 0) {
                            const angle = Math.asin(nx * Math.sin(theta));
                            const sourceXOffset = (labelWidth / 2) * (angle / theta);
                            sourceX = Math.round(centerX + sourceXOffset);
                        }

                        let sourceY = y;
                        if (smileIntensity !== 0) {
                            const verticalShift = smileIntensity * 60 * (1 - Math.cos(nx * theta));
                            sourceY = Math.round(y - verticalShift);
                        }

                        if (sourceX >= 0 && sourceX < width && sourceY >= 0 && sourceY < height) {
                            const sourceIdx = (sourceY * width + sourceX) * 4;
                            outData[idx] = data[sourceIdx];
                            outData[idx + 1] = data[sourceIdx + 1];
                            outData[idx + 2] = data[sourceIdx + 2];
                            outData[idx + 3] = data[sourceIdx + 3];
                        }
                    }
                }
                imageData.data.set(outData);
            };

            labelGroup.clearCache();
            labelGroup.filters([cylinderWarp]);

            labelGroup.cache({
                x: -padding,
                y: -padding,
                width: labelImgNode.width() + padding * 2,
                height: labelImgNode.height() + padding * 2,
                offset: padding
            });
        };

        const updateLighting = () => {
            // Remove existing overlays from group
            labelGroup.find('.lighting').forEach(node => node.destroy());

            if (!labelImgNode.image()) return;

            const shadowOpacity = document.getElementById('shadow-opacity').value / 100;
            const highlightOpacity = document.getElementById('highlight-opacity').value / 100;

            // Create a "wrap" effect by adding linear gradients over the label
            // These now live INSIDE the group so they warp with the label
            const shadowOverlay = new Konva.Rect({
                name: 'lighting',
                x: 0,
                y: 0,
                width: labelImgNode.width(),
                height: labelImgNode.height(),
                fillLinearGradientStartPoint: { x: 0, y: 0 },
                fillLinearGradientEndPoint: { x: labelImgNode.width(), y: 0 },
                fillLinearGradientColorStops: [0, `rgba(0,0,0,${shadowOpacity})`, 0.5, 'transparent', 1, 'transparent'],
                globalCompositeOperation: 'source-atop', // CLIPS TO LABEL SHAPE
                listening: false
            });

            const highlightOverlay = new Konva.Rect({
                name: 'lighting',
                x: 0,
                y: 0,
                width: labelImgNode.width(),
                height: labelImgNode.height(),
                fillLinearGradientStartPoint: { x: 0, y: 0 },
                fillLinearGradientEndPoint: { x: labelImgNode.width(), y: 0 },
                fillLinearGradientColorStops: [0, 'transparent', 0.8, 'transparent', 1, `rgba(255,255,255,${highlightOpacity})`],
                globalCompositeOperation: 'source-atop', // CLIPS TO LABEL SHAPE
                listening: false
            });

            labelGroup.add(shadowOverlay);
            labelGroup.add(highlightOverlay);
        };

        ['posX', 'posY', 'scale', 'rotation', 'wrap-intensity', 'smile-intensity', 'shadow-opacity', 'highlight-opacity'].forEach(id => {
            document.getElementById(id).oninput = updateTransform;
        });

        // Robust Compatibility-First JPEG Export
        document.getElementById('export-btn').onclick = function () {
            const btn = this;
            const originalText = btn.innerText;

            try {
                btn.innerText = 'Saving...';
                btn.style.opacity = '0.7';
                btn.disabled = true;

                // Ensure the stage is rendered correctly before capture
                mainLayer.draw();

                // Safer Blob-based Export with Config
                stage.toCanvas({
                    pixelRatio: 1.5,
                    backgroundColor: 'white'
                }).toBlob((blob) => {
                    if (!blob) {
                        throw new Error('Blob creation failed.');
                    }
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `vial-render-${Math.floor(Date.now() / 1000)}.jpg`;
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);

                    btn.innerText = 'Saved!';
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.opacity = '1';
                        btn.disabled = false;
                    }, 1500);
                }, 'image/jpeg', 0.9);

            } catch (err) {
                console.error('Export failed:', err);
                btn.innerText = 'Error';
                btn.disabled = false;
                btn.style.opacity = '1';

                let errorMsg = 'Export failed: ' + err.message;
                if (err.name === 'SecurityError') {
                    errorMsg = 'Security Error: Improve browser compatibility by hosting this file on a server (e.g. Netlify/GitHub Pages) instead of opening it directly.';
                }
                alert(errorMsg);
            }
        };

        // Config Copy/Import (For repeatability)
        document.getElementById('config-btn').onclick = async function () {
            const btn = this;
            const originalText = btn.innerText;
            const config = {
                posX: document.getElementById('posX').value,
                posY: document.getElementById('posY').value,
                scale: document.getElementById('scale').value,
                rotation: document.getElementById('rotation').value,
                wrap: document.getElementById('wrap-intensity').value,
                smile: document.getElementById('smile-intensity').value,
                shadow: document.getElementById('shadow-opacity').value,
                highlight: document.getElementById('highlight-opacity').value
            };
            const configStr = JSON.stringify(config);
            console.log('Copying configuration:', config);

            try {
                // Try modern clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(configStr);
                } else {
                    // Fallback for non-secure contexts (file:// covers this sometimes)
                    const textArea = document.createElement("textarea");
                    textArea.value = configStr;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = originalText, 1500);
            } catch (err) {
                console.error('Copy failed:', err);
                alert('Copy failed. Manual config: ' + configStr);
            }
        };

        document.getElementById('import-btn').onclick = () => {
            const input = prompt('Paste your Configuration JSON here:');
            if (!input) {
                console.log('Import cancelled or empty input.');
                return;
            }

            console.log('Raw import string:', input);

            let config;
            try {
                config = JSON.parse(input);
                console.log('Parsed config object:', config);
            } catch (err) {
                console.error('JSON Parse Error:', err);
                alert('Invalid JSON configuration string.');
                return;
            }

            try {
                const mapping = {
                    posX: 'posX',
                    posY: 'posY',
                    scale: 'scale',
                    rotation: 'rotation',
                    wrap: 'wrap-intensity',
                    smile: 'smile-intensity',
                    shadow: 'shadow-opacity',
                    highlight: 'highlight-opacity'
                };

                let count = 0;
                for (const [key, elId] of Object.entries(mapping)) {
                    if (config[key] !== undefined) {
                        const el = document.getElementById(elId);
                        if (el) {
                            el.value = config[key];
                            // Critical: Dispatch event so Konva/listeners update!
                            el.dispatchEvent(new Event('input', { bubbles: true }));
                            count++;
                        } else {
                            console.warn(`Element #${elId} not found.`);
                        }
                    }
                }

                if (count > 0) {
                    // Force a final update just in case
                    updateTransform();
                    console.log(`Success: ${count} fields updated.`);
                    alert(`Configuration imported (${count} fields updated)!`);
                } else {
                    console.warn('No matching keys found in config object.');
                    alert('No valid configuration fields found in input.');
                }
            } catch (err) {
                console.error('Runtime Import Error:', err);
                alert('An error occurred during import. Check console.');
            }
        };

        // Lighting Analysis Logic
        const analyzeLighting = () => {
            if (!vialImgNode.image()) return;

            const canvas = document.createElement('canvas');
            canvas.width = vialImgNode.width();
            canvas.height = vialImgNode.height();
            const ctx = canvas.getContext('2d');
            ctx.drawImage(vialImgNode.image(), 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width;
            const h = canvas.height;

            // Sample vertical strip in the middle to find highlights/shadows
            const stripX = Math.floor(w / 2);
            const startY = Math.floor(h * 0.3);
            const endY = Math.floor(h * 0.7);

            let maxBrightness = 0;
            let minBrightness = 255;
            let avgBrightness = 0;
            let count = 0;

            for (let y = startY; y < endY; y++) {
                // Sample horizontal strip across the vial's body
                for (let x = Math.floor(w * 0.25); x < Math.floor(w * 0.75); x++) {
                    const idx = (y * w + x) * 4;
                    const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;

                    if (brightness > maxBrightness) maxBrightness = brightness;
                    if (brightness < minBrightness) minBrightness = brightness;
                    avgBrightness += brightness;
                    count++;
                }
            }
            avgBrightness /= count;

            // Map brightness extremes to intensities
            // Highlights: How much BRIGHTER is the peak than the average?
            const highlightRange = maxBrightness - avgBrightness;
            const newHighlight = Math.min(100, Math.max(10, (highlightRange / 255) * 300));

            // Shadows: How much DARKER is the valley than the average?
            const shadowRange = avgBrightness - minBrightness;
            const newShadow = Math.min(100, Math.max(10, (shadowRange / 255) * 400));

            document.getElementById('highlight-opacity').value = Math.round(newHighlight);
            document.getElementById('shadow-opacity').value = Math.round(newShadow);

            updateTransform();
        };

        // Magic Fit (Edge Detection)
        document.getElementById('autofit-btn').onclick = () => {
            if (!vialImgNode.image()) {
                alert('Please upload a vial image first.');
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = vialImgNode.width();
            canvas.height = vialImgNode.height();
            const ctx = canvas.getContext('2d');
            ctx.drawImage(vialImgNode.image(), 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width;
            const h = canvas.height;

            // Simple Sobel-style vertical edge detection in the middle 30% of the vial
            const startY = Math.floor(h * 0.35);
            const endY = Math.floor(h * 0.65);
            const edgeScores = new Float32Array(w).fill(0);

            for (let y = startY; y < endY; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = (y * w + x) * 4;
                    // Grayscale conversion
                    const grayLeft = (data[idx - 4] + data[idx - 3] + data[idx - 2]) / 3;
                    const grayRight = (data[idx + 4] + data[idx + 5] + data[idx + 6]) / 3;
                    const diff = Math.abs(grayRight - grayLeft);
                    edgeScores[x] += diff;
                }
            }

            // Find peaks from left and right
            let leftEdge = 0;
            let rightEdge = w;
            const threshold = (endY - startY) * 15; // Tunable sensitivity

            for (let x = 10; x < w / 2; x++) {
                if (edgeScores[x] > threshold) {
                    leftEdge = x;
                    break;
                }
            }
            for (let x = w - 11; x > w / 2; x--) {
                if (edgeScores[x] > threshold) {
                    rightEdge = x;
                    break;
                }
            }

            const vialCenterX = (leftEdge + rightEdge) / 2 + vialImgNode.x();
            const vialWidth = rightEdge - leftEdge;

            // Update UI and apply
            const newPosX = Math.round((vialCenterX / width) * 1000);
            const newScale = Math.round((vialWidth / labelImgNode.width()) * 100 * 0.95); // 95% width for safety

            document.getElementById('posX').value = newPosX;
            document.getElementById('scale').value = newScale;
            document.getElementById('wrap-intensity').value = 40; // Default wrap hint

            analyzeLighting(); // Also analyze lighting during magic fit
            updateTransform();
            alert('Magic Fit applied!');
        };

        // --- CROP FUNCTIONALITY ---
        let cropStage, cropLayer, cropImageNode, cropTransformer, cropRect;
        let originalLabelImageObj = null; // Store the original uncropped image

        const initCrop = () => {
            if (!originalLabelImageObj) return;

            const overlay = document.getElementById('crop-overlay');
            const container = document.getElementById('crop-container');
            overlay.style.display = 'flex';

            // Clean up previous instance if exists
            if (cropStage) cropStage.destroy();

            // Calculate max dimensions for the crop view
            const maxWidth = window.innerWidth * 0.8;
            const maxHeight = window.innerHeight * 0.7;
            const scale = Math.min(maxWidth / originalLabelImageObj.width, maxHeight / originalLabelImageObj.height);

            const displayWidth = originalLabelImageObj.width * scale;
            const displayHeight = originalLabelImageObj.height * scale;

            cropStage = new Konva.Stage({
                container: 'crop-container',
                width: displayWidth,
                height: displayHeight,
            });

            cropLayer = new Konva.Layer();
            cropStage.add(cropLayer);

            // Display the full original image
            cropImageNode = new Konva.Image({
                x: 0,
                y: 0,
                image: originalLabelImageObj,
                width: displayWidth,
                height: displayHeight,
                listening: false
            });
            cropLayer.add(cropImageNode);

            // Create a selection rectangle
            const initialCropW = displayWidth * 0.8;
            const initialCropH = displayHeight * 0.5;

            cropRect = new Konva.Rect({
                x: (displayWidth - initialCropW) / 2,
                y: (displayHeight - initialCropH) / 2,
                width: initialCropW,
                height: initialCropH,
                fill: 'rgba(255, 255, 255, 0.2)',
                stroke: 'white',
                strokeWidth: 2,
                draggable: true,
                name: 'cropRect'
            });
            cropLayer.add(cropRect);

            // Transformer for resizing
            cropTransformer = new Konva.Transformer({
                nodes: [cropRect],
                keepRatio: false,
                boundBoxFunc: (oldBox, newBox) => {
                    // Simple bounds checking could go here
                    return newBox;
                }
            });
            cropLayer.add(cropTransformer);
        };

        document.getElementById('crop-btn').onclick = () => {
            // If we have a current label, use its source as the "original" if not yet stored
            // Ideally, we store the full-res upload separately.
            // For now, we assume the user just uploaded something or we grab the current src.
            const currentSrc = labelImgNode.image() ? labelImgNode.image().src : null;
            if (!currentSrc) {
                alert('Please upload a label first.');
                return;
            }

            // Always reload the source to ensure we crop from the best quality we have currently
            // (In a production app, we'd cache the file object from the upload listener)
            if (!originalLabelImageObj) {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    originalLabelImageObj = img;
                    initCrop();
                };
                img.src = currentSrc;
            } else {
                initCrop();
            }
        };

        document.getElementById('cancel-crop-btn').onclick = () => {
            document.getElementById('crop-overlay').style.display = 'none';
        };

        document.getElementById('apply-crop-btn').onclick = () => {
            if (!cropRect || !cropImageNode) return;

            // 1. Get the crop selection in "display" coordinates
            const rectX = cropRect.x();
            const rectY = cropRect.y();
            const rectW = cropRect.width() * cropRect.scaleX();
            const rectH = cropRect.height() * cropRect.scaleY();

            // 2. Map back to original image coordinates
            // displayWidth / originalWidth = scaleFactor
            const scaleFactor = cropImageNode.width() / originalLabelImageObj.width;

            const sourceX = Math.max(0, rectX / scaleFactor);
            const sourceY = Math.max(0, rectY / scaleFactor);
            const sourceW = Math.min(originalLabelImageObj.width - sourceX, rectW / scaleFactor);
            const sourceH = Math.min(originalLabelImageObj.height - sourceY, rectH / scaleFactor);

            if (sourceW <= 0 || sourceH <= 0) {
                alert('Invalid crop area.');
                return;
            }

            // 3. Draw to hidden canvas to execute crop
            const hiddenCanvas = document.createElement('canvas');
            hiddenCanvas.width = sourceW;
            hiddenCanvas.height = sourceH;
            const ctx = hiddenCanvas.getContext('2d');

            ctx.drawImage(
                originalLabelImageObj,
                sourceX, sourceY, sourceW, sourceH, // Source
                0, 0, sourceW, sourceH              // Destination
            );

            // 4. Update the main app state
            const newImg = new Image();
            newImg.crossOrigin = "Anonymous";
            newImg.onload = () => {
                labelImgNode.image(newImg);
                labelImgNode.width(newImg.width * 0.5); // Reset viewing size or keep ratio
                labelImgNode.height(newImg.height * 0.5);

                // Update Group Offset to match new center
                labelGroup.offsetX(labelImgNode.width() / 2);
                labelGroup.offsetY(labelImgNode.height() / 2);

                updateTransform();

                // Update 'original' for next crop to be recursive? 
                // Or keep original-original? Let's update it so they can crop again finely.
                originalLabelImageObj = newImg;

                document.getElementById('crop-overlay').style.display = 'none';
            };
            newImg.src = hiddenCanvas.toDataURL();
        };
    </script>
