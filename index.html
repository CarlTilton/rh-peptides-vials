<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vial Labeler - Professional Product Branding</title>
    <script src="https://unpkg.com/konva@9.3.1/konva.min.js"></script>
    <style>
        :root {
            --primary: #007aff;
            --background: #0a0a0c;
            --surface: #1c1c1e;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --accent: #32d74b;
            --border: #38383a;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        aside {
            width: 350px;
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            background: var(--border);
            height: 4px;
            border-radius: 2px;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .file-input {
            position: relative;
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-input:hover {
            border-color: var(--primary);
            background: rgba(0, 122, 255, 0.05);
        }

        .file-input input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1c1c1e 0%, #0a0a0c 100%);
            position: relative;
        }

        #canvas-container {
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        .button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .button:hover {
            opacity: 0.9;
        }

        .button.secondary {
            background-color: var(--border);
            color: var(--text);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <aside>
        <h1>Vial Labeler</h1>

        <div class="control-group">
            <div class="section-title">Assets</div>
            <div class="control-item">
                <label>Vial Image (Blank)</label>
                <div class="file-input">
                    <span id="vial-status">Click to upload vial</span>
                    <input type="file" id="vial-upload" accept="image/*">
                </div>
            </div>
            <div class="control-item">
                <label>Label Image</label>
                <div class="file-input">
                    <span id="label-status">Click to upload label</span>
                    <input type="file" id="label-upload" accept="image/*">
                </div>
            </div>
        </div>

        <div class="control-group">
            <div class="section-title">Label Alignment</div>
            <div class="control-item">
                <label>Position X</label>
                <input type="range" id="posX" min="0" max="1000" value="500">
            </div>
            <div class="control-item">
                <label>Position Y</label>
                <input type="range" id="posY" min="0" max="1000" value="500">
            </div>
            <div class="control-item">
                <label>Scale</label>
                <input type="range" id="scale" min="1" max="500" value="100">
            </div>
            <div class="control-item">
                <label>Rotation</label>
                <input type="range" id="rotation" min="0" max="360" value="0">
            </div>
            <div class="control-item">
                <label>Wrap Intensity</label>
                <input type="range" id="wrap-intensity" min="0" max="100" value="0">
            </div>
            <div class="control-item">
                <label>Smile (Vertical Curve)</label>
                <input type="range" id="smile-intensity" min="-400" max="400" value="0">
            </div>
        </div>

        <div class="control-group">
            <div class="section-title">Lighting</div>
            <div class="control-item">
                <label>Shadow Intensity</label>
                <input type="range" id="shadow-opacity" min="0" max="100" value="50">
            </div>
            <div class="control-item">
                <label>Highlight Intensity</label>
                <input type="range" id="highlight-opacity" min="0" max="100" value="30">
            </div>
        </div>

        <div class="actions">
            <button type="button" class="button secondary" id="export-btn">Save JPEG</button>
            <button type="button" class="button secondary" id="config-btn">Copy Config</button>
            <button type="button" class="button secondary" id="import-btn">Import Config</button>
            <button type="button" class="button" id="autofit-btn"
                style="grid-column: span 1; background: var(--accent);">✨ Magic Fit</button>
        </div>
    </aside>

    <main>
        <div id="canvas-container"></div>
    </main>

        // Constants & Utilities
        const width = 1000;
        const height = 1000;
        const stage = new Konva.Stage({
            container: 'canvas-container',
            width: width,
            height: height
        });

        const layer = new Konva.Layer();
        stage.add(layer);

        // State & Nodes
        const vialImgNode = new Konva.Image({ x: 0, y: 0, width, height });
        const labelImgNode = new Konva.Image({ draggable: false });
        const shadowOverlay = new Konva.Image({ width, height, listening: false, globalCompositeOperation: 'multiply' });
        const highlightOverlay = new Konva.Image({ width, height, listening: false, globalCompositeOperation: 'screen' });

        layer.add(vialImgNode);
        layer.add(labelImgNode);
        layer.add(shadowOverlay);
        layer.add(highlightOverlay);

        // Core Rendering Logic: Curved Deformation
        function updateTransform() {
            const posX = parseInt(document.getElementById('posX').value);
            const posY = parseInt(document.getElementById('posY').value);
            const scale = parseInt(document.getElementById('scale').value) / 100;
            const rotation = parseInt(document.getElementById('rotation').value);
            const wrap = parseInt(document.getElementById('wrap-intensity').value) / 100;
            const smile = parseInt(document.getElementById('smile-intensity').value);

            const baseWidth = labelImgNode.image() ? labelImgNode.image().width : 0;
            const baseHeight = labelImgNode.image() ? labelImgNode.image().height : 0;

            if (!baseHeight) return;

            const targetWidth = baseWidth * scale;
            const targetHeight = baseHeight * scale;

            // Simple "Smile" implementation using Konva's offset and scale
            // For a true mesh deformation, we'd need a custom Shape or WebGL
            // Here we use a CSS-like transformation approach inside Konva
            labelImgNode.setAttrs({
                x: posX,
                y: posY,
                width: targetWidth,
                height: targetHeight,
                rotation: rotation,
                offsetX: targetWidth / 2,
                offsetY: targetHeight / 2,
            });

            // Lighting setup
            shadowOverlay.opacity(parseInt(document.getElementById('shadow-opacity').value) / 100);
            highlightOverlay.opacity(parseInt(document.getElementById('highlight-opacity').value) / 100);

            // Apply horizontal "wrap" via scale distortion (fake 3D)
            const wrapFactor = 1 - (wrap * 0.3);
            labelImgNode.scaleX(wrapFactor);

            // Vertical curve (Smile) approximation
            // Note: True curved warping requires custom Konva.Shape
            labelImgNode.skewX(smile / 1000);

            layer.batchDraw();
        }

        // Image Handling
        function loadVial(src) {
            const img = new Image();
            img.onload = () => {
                vialImgNode.image(img);
                document.getElementById('vial-status').innerText = "Vial Loaded ✓";
                layer.batchDraw();
            };
            img.src = src;
        }

        function loadLabel(src) {
            const img = new Image();
            img.onload = () => {
                labelImgNode.image(img);
                document.getElementById('label-status').innerText = "Label Loaded ✓";
                updateTransform();
            };
            img.src = src;
        }

        // Initialize with default
        loadVial(DEFAULT_VIAL_BASE64);

        // Event Listeners
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', updateTransform);
        });

        document.getElementById('vial-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => loadVial(event.target.result);
            reader.readAsDataURL(file);
        };

        document.getElementById('label-upload').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => loadLabel(event.target.result);
            reader.readAsDataURL(file);
        };

        document.getElementById('export-btn').onclick = () => {
            const dataURL = stage.toDataURL({ pixelRatio: 2 });
            const link = document.createElement('a');
            link.download = 'vial-mockup.jpg';
            link.href = dataURL;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        document.getElementById('config-btn').onclick = () => {
            const config = {
                posX: document.getElementById('posX').value,
                posY: document.getElementById('posY').value,
                scale: document.getElementById('scale').value,
                rotation: document.getElementById('rotation').value,
                wrap: document.getElementById('wrap-intensity').value,
                smile: document.getElementById('smile-intensity').value,
                shadow: document.getElementById('shadow-opacity').value,
                highlight: document.getElementById('highlight-opacity').value
            };
            const configStr = JSON.stringify(config);

            const btn = document.getElementById('config-btn');
            const originalText = btn.innerText;

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(configStr);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = configStr;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }

                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = originalText, 1500);
            } catch (err) {
                console.error('Copy failed:', err);
                alert('Copy failed. Manual config: ' + configStr);
            }
        };

        document.getElementById('import-btn').onclick = () => {
            const input = prompt('Paste your Configuration JSON here:');
            if (!input) {
                console.log('Import cancelled or empty input.');
                return;
            }

            console.log('Raw import string:', input);

            let config;
            try {
                config = JSON.parse(input);
                console.log('Parsed config object:', config);
            } catch (err) {
                console.error('JSON Parse Error:', err);
                alert('Invalid JSON configuration string.');
                return;
            }

            try {
                const mapping = {
                    posX: 'posX',
                    posY: 'posY',
                    scale: 'scale',
                    rotation: 'rotation',
                    wrap: 'wrap-intensity',
                    smile: 'smile-intensity',
                    shadow: 'shadow-opacity',
                    highlight: 'highlight-opacity'
                };

                let count = 0;
                for (const [key, elId] of Object.entries(mapping)) {
                    if (config[key] !== undefined) {
                        const el = document.getElementById(elId);
                        if (el) {
                            el.value = config[key];
                            // Critical: Dispatch event so Konva/listeners update!
                            el.dispatchEvent(new Event('input', { bubbles: true }));
                            count++;
                        } else {
                            console.warn(`Element #${elId} not found.`);
                        }
                    }
                }

                if (count > 0) {
                    // Force a final update just in case
                    updateTransform();
                    console.log(`Success: ${count} fields updated.`);
                    alert(`Configuration imported (${count} fields updated)!`);
                } else {
                    console.warn('No matching keys found in config object.');
                    alert('No valid configuration fields found in input.');
                }
            } catch (err) {
                console.error('Runtime Import Error:', err);
                alert('An error occurred during import. Check console.');
            }
        };

        // Lighting Analysis Logic
        const analyzeLighting = () => {
            if (!vialImgNode.image()) return;

            const canvas = document.createElement('canvas');
            canvas.width = vialImgNode.width();
            canvas.height = vialImgNode.height();
            const ctx = canvas.getContext('2d');
            ctx.drawImage(vialImgNode.image(), 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width;
            const h = canvas.height;

            // Sample vertical strip in the middle to find highlights/shadows
            const stripX = Math.floor(w / 2);
            const startY = Math.floor(h * 0.3);
            const endY = Math.floor(h * 0.7);

            let maxBrightness = 0;
            let minBrightness = 255;
            let avgBrightness = 0;
            let count = 0;

            for (let y = startY; y < endY; y++) {
                // Sample horizontal strip across the vial's body
                for (let x = Math.floor(w * 0.25); x < Math.floor(w * 0.75); x++) {
                    const idx = (y * w + x) * 4;
                    const brightness = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;

                    if (brightness > maxBrightness) maxBrightness = brightness;
                    if (brightness < minBrightness) minBrightness = brightness;
                    avgBrightness += brightness;
                    count++;
                }
            }
            avgBrightness /= count;

            // Map brightness extremes to intensities
            // Highlights: How much BRIGHTER is the peak than the average?
            const highlightRange = maxBrightness - avgBrightness;
            const newHighlight = Math.min(100, Math.max(10, (highlightRange / 255) * 300));

            // Shadows: How much DARKER is the valley than the average?
            const shadowRange = avgBrightness - minBrightness;
            const newShadow = Math.min(100, Math.max(10, (shadowRange / 255) * 400));

            document.getElementById('highlight-opacity').value = Math.round(newHighlight);
            document.getElementById('shadow-opacity').value = Math.round(newShadow);

            updateTransform();
        };

        // Magic Fit (Edge Detection)
        document.getElementById('autofit-btn').onclick = () => {
            if (!vialImgNode.image()) {
                alert('Please upload a vial image first.');
                return;
            }

            const canvas = document.createElement('canvas');
            canvas.width = vialImgNode.width();
            canvas.height = vialImgNode.height();
            const ctx = canvas.getContext('2d');
            ctx.drawImage(vialImgNode.image(), 0, 0, canvas.width, canvas.height);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const w = canvas.width;
            const h = canvas.height;

            // Simple Sobel-style vertical edge detection in the middle 30% of the vial
            const startY = Math.floor(h * 0.35);
            const endY = Math.floor(h * 0.65);
            const edgeScores = new Float32Array(w).fill(0);

            for (let y = startY; y < endY; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = (y * w + x) * 4;
                    // Grayscale conversion
                    const grayLeft = (data[idx - 4] + data[idx - 3] + data[idx - 2]) / 3;
                    const grayRight = (data[idx + 4] + data[idx + 5] + data[idx + 6]) / 3;
                    const diff = Math.abs(grayRight - grayLeft);
                    edgeScores[x] += diff;
                }
            }

            // Find peaks from left and right
            let leftEdge = 0;
            let rightEdge = w;
            const threshold = (endY - startY) * 15; // Tunable sensitivity

            for (let x = 10; x < w / 2; x++) {
                if (edgeScores[x] > threshold) {
                    leftEdge = x;
                    break;
                }
            }
            for (let x = w - 11; x > w / 2; x--) {
                if (edgeScores[x] > threshold) {
                    rightEdge = x;
                    break;
                }
            }

            const vialCenterX = (leftEdge + rightEdge) / 2 + vialImgNode.x();
            const vialWidth = rightEdge - leftEdge;

            // Update UI and apply
            const newPosX = Math.round((vialCenterX / width) * 1000);
            const newScale = Math.round((vialWidth / labelImgNode.width()) * 100 * 0.95); // 95% width for safety

            document.getElementById('posX').value = newPosX;
            document.getElementById('scale').value = newScale;
            document.getElementById('wrap-intensity').value = 40; // Default wrap hint

            analyzeLighting(); // Also analyze lighting during magic fit
            updateTransform();
            alert('Magic Fit applied!');
        };
    </script>
